services:
  grafana:
    build:
      context: ./monitoring/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      mimir:
        condition: service_started
    networks:
      - dokploy-network
    restart: on-failure:3
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - 3000
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  loki:
    build:
      context: ./monitoring/loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki-data:/loki
    networks:
      - dokploy-network
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - 3100
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  tempo:
    build:
      context: ./monitoring/tempo
    command: -config.file=/etc/tempo/config.yml
    volumes:
      - tempo-data:/var/tempo
    networks:
      - dokploy-network
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - 3200
      - 4317
      - 4318
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  mimir:
    build:
      context: ./monitoring/mimir
    command:
      - -config.file=/etc/mimir/config.yml
      - -server.http-listen-port=9009
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - mimir-data:/data/mimir
    networks:
      - dokploy-network
    restart: on-failure:3
    healthcheck:
      disable: true
    expose:
      - 9009
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  alloy:
    build:
      context: ./monitoring/alloy
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - alloy-data:/var/lib/alloy/data
    depends_on:
      mimir:
        condition: service_started
      node-exporter:
        condition: service_started
    networks:
      - dokploy-network
    restart: on-failure:3
    expose:
      - 12345 # Alloy UI / self-metrics
      - 9090 # Prometheus remote_write ingest
      - 3500 # Loki push ingest
      - 4317 # OTLP gRPC ingest
      - 4318 # OTLP HTTP ingest
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - dokploy-network
    restart: on-failure:3
    expose:
      - 9100
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

networks:
  default:
    name: dokploy-network
    external: true
  dokploy-network:
    external: true

volumes:
  grafana-data:
  loki-data:
  tempo-data:
  mimir-data:
  alloy-data:
